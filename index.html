<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Data-Cleaner | 智能数据清洗引擎</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.25) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(147, 197, 253, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #93c5fd 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
        }

        .upload-area {
            border: 2px dashed rgba(59, 130, 246, 0.4);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(59, 130, 246, 0.02);
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.08);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .upload-area:hover .upload-icon {
            transform: translateY(-5px);
        }

        input[type="file"] {
            display: none;
        }

        .file-name {
            margin-top: 15px;
            font-weight: 500;
            color: #93c5fd;
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            box-shadow: 0 6px 25px rgba(37, 99, 235, 0.5);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result Section */
        .result-section {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            color: #a7f3d0;
            overflow-x: auto;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .log-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .download-btn {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: rgba(16, 185, 129, 0.2);
            transform: translateY(-2px);
        }

        .error-msg {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Auto Data-Cleaner Agent</h1>

        </div>

        <div class="glass-panel">
            <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <div class="upload-icon">📂</div>
                <h3 style="margin: 0 0 10px 0; font-weight: 600;">点击上传，或拖拽文件至此</h3>
                <p style="margin: 0; color: var(--text-muted); font-size: 0.9rem;">仅支持包含脏数据的 .csv 文件</p>
                <input type="file" id="file-input" accept=".csv">
                <div class="file-name" id="file-name">未选择文件</div>
            </div>

            <div class="error-msg" id="error-msg"></div>

            <button class="btn" id="submit-btn" disabled>
                <div class="spinner" id="spinner"></div>
                <span id="btn-text">开始智能清洗</span>
            </button>

            <div class="result-section" id="result-section">
                <div class="log-title">
                    <span>🤖</span> <span>Agent 思考与生成的 Pandas 代码:</span>
                </div>
                <div class="log-box" id="log-box"></div>
                <div style="text-align: center; margin-top: 20px;">
                    <a href="#" class="download-btn" id="download-link" target="_blank">
                        ⬇️ 立即下载干净的清洗结果
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('spinner');
        const resultSection = document.getElementById('result-section');
        const logBox = document.getElementById('log-box');
        const downloadLink = document.getElementById('download-link');
        const errorMsg = document.getElementById('error-msg');

        let selectedFile = null;

        // 文件拖拽与选择逻辑
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });

        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect() {
            if (fileInput.files.length > 0) {
                selectedFile = fileInput.files[0];
                if (!selectedFile.name.endsWith('.csv')) {
                    showError("请上传 CSV 格式的文件");
                    selectedFile = null;
                    submitBtn.disabled = true;
                    fileNameDisplay.style.display = 'none';
                    return;
                }
                fileNameDisplay.textContent = `已选择: ${selectedFile.name}`;
                fileNameDisplay.style.display = 'block';
                submitBtn.disabled = false;
                hideError();
                resultSection.style.display = 'none';
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function hideError() {
            errorMsg.style.display = 'none';
        }

        // 提交清洗逻辑
        submitBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // UI 状态更新为 Loading
            submitBtn.disabled = true;
            btnText.textContent = "Agent 正在思考并执行代码...";
            spinner.style.display = 'block';
            hideError();
            resultSection.style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/upload_and_clean/', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // 成功
                    logBox.textContent = data.llm_code;
                    downloadLink.href = data.cleaned_file_url;
                    resultSection.style.display = 'block';
                } else {
                    // 后端抛出错误
                    showError(`清洗失败: ${data.message || '未知错误'}`);
                    if (data.llm_code) {
                        logBox.textContent = data.llm_code;
                        resultSection.style.display = 'block';
                    }
                }
            } catch (err) {
                showError("网络请求失败，请确保后端服务正常运行。");
            } finally {
                // UI 状态恢复
                submitBtn.disabled = false;
                btnText.textContent = "开始智能清洗";
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
